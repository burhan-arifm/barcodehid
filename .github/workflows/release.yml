name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (AppImage)
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "1" # systray requires CGo on Linux
            out: barcodehid
            appimage: true
            artifact: barcodehid-linux-x86_64.AppImage

          - name: Windows
            runner: windows-latest
            goos: windows
            goarch: amd64
            cgo: "0"
            out: barcodehid-windows-amd64.exe
            appimage: false
            artifact: barcodehid-windows-amd64.exe

          - name: macOS Intel (cross from ARM)
            runner: macos-latest
            goos: darwin
            goarch: amd64
            cgo: "1"
            out: barcodehid-macos-amd64
            appimage: false
            artifact: BarcodeHID-macos-amd64.app.zip

          - name: macOS Apple Silicon
            runner: macos-latest
            goos: darwin
            goarch: arm64
            cgo: "1"
            out: barcodehid-macos-arm64
            appimage: false
            artifact: BarcodeHID-macos-arm64.app.zip

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      # ── Ensure qrcode.min.js is present ──────────────────────────────────────
      - name: Download qrcode.min.js if missing
        if: runner.os != 'Windows'
        run: |
          if [ ! -f "assets/qrcode.min.js" ]; then
            echo "Downloading qrcode.min.js from npm registry..."
            curl -fsSL "https://registry.npmjs.org/qrcodejs2/-/qrcodejs2-0.0.2.tgz"               -o /tmp/qrcodejs.tgz
            tar -xzf /tmp/qrcodejs.tgz -C /tmp/
            cp /tmp/package/qrcode.min.js assets/qrcode.min.js
            echo "Downloaded: $(wc -c < assets/qrcode.min.js) bytes"
          else
            echo "qrcode.min.js already present: $(wc -c < assets/qrcode.min.js) bytes"
          fi

      - name: Download qrcode.min.js if missing (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/qrcode.min.js")) {
            Write-Host "Downloading qrcode.min.js from npm registry..."
            Invoke-WebRequest -Uri "https://registry.npmjs.org/qrcodejs2/-/qrcodejs2-0.0.2.tgz" `
              -OutFile "$env:TEMP\qrcodejs.tgz"
            tar -xzf "$env:TEMP\qrcodejs.tgz" -C "$env:TEMP"
            Copy-Item "$env:TEMP\package\qrcode.min.js" "assets\qrcode.min.js"
          } else {
            Write-Host "qrcode.min.js already present"
          }

      # ── Platform build dependencies ────────────────────────────────────────
      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libglib2.0-dev

      - name: Install Windows icon tool (goversioninfo)
        if: matrix.goos == 'windows'
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      # ── Resolve build tags ─────────────────────────────────────────────────
      - name: Resolve build tags (Unix)
        if: runner.os != 'Windows'
        id: tags_unix
        run: |
          TAGS=""
          [ -f assets/beep.mp3 ] && TAGS="-tags beep"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Resolve build tags (Windows)
        if: runner.os == 'Windows'
        id: tags_win
        shell: pwsh
        run: |
          $tagArg = ""
          if (Test-Path "assets/beep.mp3") { $tagArg = "-tags beep" }
          "tags=$tagArg" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── Embed Windows icon ─────────────────────────────────────────────────
      - name: Embed Windows icon
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $env:GOPATH = "$env:USERPROFILE\go"
          $tool = "$env:GOPATH\bin\goversioninfo.exe"
          & $tool -icon packaging/windows/barcodehid.ico `
                  -o resource.syso `
                  packaging/windows/versioninfo.json

      # ── Build binary ───────────────────────────────────────────────────────
      - name: Build (Unix)
        if: runner.os != 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          go build \
            ${{ steps.tags_unix.outputs.tags }} \
            -ldflags="-s -w -X main.buildVariant=portable" \
            -trimpath \
            -o ${{ matrix.out }} \
            .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        shell: pwsh
        run: |
          $tagArg = "${{ steps.tags_win.outputs.tags }}"
          Invoke-Expression "go build $tagArg -ldflags=`"-s -w -X main.buildVariant=portable`" -trimpath -o ${{ matrix.out }} ."

      # ── macOS .app bundle ──────────────────────────────────────────────────
      - name: Build macOS .app bundle
        if: matrix.goos == 'darwin'
        run: |
          mkdir -p dist
          chmod +x packaging/macos/make-app-bundle.sh
          bash packaging/macos/make-app-bundle.sh \
            ${{ matrix.out }} dist/
          # Verify zip was created
          ls -lh dist/

      # ── Linux AppImage ─────────────────────────────────────────────────────
      - name: Build AppImage
        if: matrix.appimage == true
        run: |
          sudo apt-get install -y libfuse2
          curl -fsSL -o appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps

          cp ${{ matrix.out }}                                AppDir/usr/bin/barcodehid
          cp packaging/appimage/AppRun                       AppDir/AppRun
          cp packaging/appimage/barcodehid.desktop           AppDir/barcodehid.desktop
          # PNG at root — used by AppImage runtime and KDE for launcher icon
          cp packaging/appimage/barcodehid.png               AppDir/barcodehid.png
          # SVG in hicolor tree — used by desktop environments
          cp packaging/appimage/barcodehid.svg               AppDir/usr/share/icons/hicolor/scalable/apps/barcodehid.svg
          # PNG in hicolor tree — fallback for DEs that prefer PNG
          cp packaging/appimage/barcodehid.png               AppDir/usr/share/icons/hicolor/256x256/apps/barcodehid.png
          chmod +x AppDir/usr/bin/barcodehid AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir barcodehid-linux-x86_64.AppImage
          chmod +x barcodehid-linux-x86_64.AppImage

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload Linux AppImage
        if: matrix.appimage == true
        uses: actions/upload-artifact@v7
        with:
          name: barcodehid-linux-x86_64.AppImage
          path: barcodehid-linux-x86_64.AppImage
          retention-days: 1

      - name: Upload Windows binary
        if: matrix.goos == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: barcodehid-windows-amd64.exe
          path: barcodehid-windows-amd64.exe
          retention-days: 1

      - name: Upload macOS bundle
        if: matrix.goos == 'darwin'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          # Path is inside dist/ — must match where make-app-bundle.sh puts it
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  # ── Publish release ────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BarcodeHID ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/*
          body: |
            ## BarcodeHID ${{ github.ref_name }}

            Scan barcodes with your Android or iPhone camera → keyboard input on your PC.
            Single-file distribution. No drivers. No installation.

            ---

            ### Downloads

            | File | Platform |
            |---|---|
            | `barcodehid-linux-x86_64.AppImage` | Linux x64 (any distro) |
            | `barcodehid-windows-amd64.exe` | Windows x64 |
            | `BarcodeHID-macos-arm64.app.zip` | macOS Apple Silicon (M1/M2/M3/M4) |
            | `BarcodeHID-macos-amd64.app.zip` | macOS Intel |

            ---

            ### Linux
            ```bash
            chmod +x barcodehid-linux-x86_64.AppImage
            ./barcodehid-linux-x86_64.AppImage
            # Tray icon appears + notification with connection URL
            # Right-click tray → Show QR Code → scan with phone
            ```
            For real kernel-level HID (works in terminals/games too): `bash setup.sh`

            ---

            ### Windows
            Just run `barcodehid-windows-amd64.exe`.
            Tray icon appears in the system tray (bottom-right).
            Right-click → **Show QR Code** → scan with phone.

            ---

            ### macOS — important: three steps before first run

            > ⚠️ Skipping any of these steps causes the app to open silently with no feedback.

            **Step 1 — Unzip and move to Applications**
            Unzip the downloaded `.app.zip` and drag `BarcodeHID.app` to your Applications folder.

            **Step 2 — Remove quarantine flag** (macOS blocks all unsigned downloaded apps)
            ```bash
            xattr -d com.apple.quarantine /Applications/BarcodeHID.app
            ```

            **Step 3 — Grant Accessibility permission** (required for keyboard simulation)
            ```
            System Settings → Privacy & Security → Accessibility → + → BarcodeHID → toggle ON
            ```
            The app exits silently without this. If nothing happens when you open it, this is why.

            **Then open the app:**
            Double-click `BarcodeHID` in Applications. A notification appears and a
            menu bar icon shows in the top-right of your screen.
            Right-click the menu bar icon → **Show QR Code** → scan with phone camera.

            📖 **Full macOS guide:** [docs/macos-setup.md](docs/macos-setup.md)

            ---

            ### All platforms — first connection
            1. Right-click tray/menu bar icon → **Show QR Code**
            2. Scan QR with phone camera → browser opens
            3. First visit: tap through the certificate warning (self-signed, local only)
            4. Allow camera access
            5. Scanner is ready — click a text field on your PC, then scan a barcode

name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (AppImage)
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "0"
            out: barcodehid
            appimage: true
            artifact: barcodehid-linux-x86_64.AppImage

          - name: Windows
            runner: windows-latest
            goos: windows
            goarch: amd64
            cgo: "0"
            out: barcodehid-windows-amd64.exe
            appimage: false
            artifact: barcodehid-windows-amd64.exe

          - name: macOS Intel (cross from ARM)
            runner: macos-latest
            goos: darwin
            goarch: amd64
            cgo: "1"
            out: barcodehid-macos-amd64
            appimage: false
            artifact: barcodehid-macos-amd64

          - name: macOS Apple Silicon
            runner: macos-latest
            goos: darwin
            goarch: arm64
            cgo: "1"
            out: barcodehid-macos-arm64
            appimage: false
            artifact: barcodehid-macos-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Resolve build tags (Unix)
        if: runner.os != 'Windows'
        id: tags_unix
        run: |
          TAGS=""
          [ -f assets/beep.mp3 ] && TAGS="-tags beep"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Resolve build tags (Windows)
        if: runner.os == 'Windows'
        id: tags_win
        shell: pwsh
        run: |
          $tagArg = ""
          if (Test-Path "assets/beep.mp3") { $tagArg = "-tags beep" }
          "tags=$tagArg" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build (Unix)
        if: runner.os != 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          go build \
            ${{ steps.tags_unix.outputs.tags }} \
            -ldflags="-s -w -X main.buildVariant=portable" \
            -trimpath \
            -o ${{ matrix.out }} \
            .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        shell: pwsh
        run: |
          $tagArg = "${{ steps.tags_win.outputs.tags }}"
          Invoke-Expression "go build $tagArg -ldflags=`"-s -w -X main.buildVariant=portable`" -trimpath -o ${{ matrix.out }} ."

      - name: Build AppImage
        if: matrix.appimage == true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfuse2

          curl -fsSL -o appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps

          cp ${{ matrix.out }}                                      AppDir/usr/bin/barcodehid
          cp packaging/appimage/AppRun                             AppDir/AppRun
          cp packaging/appimage/barcodehid.desktop                 AppDir/barcodehid.desktop
          cp packaging/appimage/barcodehid.svg                     AppDir/barcodehid.svg
          cp packaging/appimage/barcodehid.svg                     AppDir/usr/share/icons/hicolor/scalable/apps/barcodehid.svg
          chmod +x AppDir/usr/bin/barcodehid AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir barcodehid-linux-x86_64.AppImage
          chmod +x barcodehid-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BarcodeHID ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/*
          body: |
            ## BarcodeHID ${{ github.ref_name }}

            Scan barcodes with your Android phone → keyboard input on your PC.
            Single-file. No drivers. No installation.

            ### Downloads

            | File | Platform |
            |---|---|
            | `barcodehid-linux-x86_64.AppImage` | Linux x64 (any distro) |
            | `barcodehid-windows-amd64.exe` | Windows x64 |
            | `barcodehid-macos-amd64` | macOS Intel |
            | `barcodehid-macos-arm64` | macOS Apple Silicon |

            See [README.md](README.md) for setup and usage instructions.
